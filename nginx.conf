# ШАГ 2: Финальный конфиг — HTTP + HTTPS
# Используется после получения сертификата

# Редирект HTTP -> HTTPS
server {
    listen 80;
    server_name kkikmee.com.ru www.kkikmee.com.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name kkikmee.com.ru www.kkikmee.com.ru;

    ssl_certificate     /etc/letsencrypt/live/kkikmee.com.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kkikmee.com.ru/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_prefer_server_ciphers on;

    client_max_body_size 10M;

    # Статика Django
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Медиафайлы (аватарки и т.д.)
    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    # Django приложение
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering off;
    }
}
