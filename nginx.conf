server {
    listen 80;
    server_name kkikmee.ru www.kkikmee.ru;

    return 301 https://kkikmee.ru$request_uri;
}

server {
    listen 443 ssl;
    server_name kkikmee.ru;

    ssl_certificate /etc/letsencrypt/live/kkikmee.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kkikmee.ru/privkey.pem;

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
