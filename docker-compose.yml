services:

  # ─── PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: taskmanager_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-taskmanager}
      POSTGRES_USER: ${POSTGRES_USER:-taskuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taskpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskuser} -d ${POSTGRES_DB:-taskmanager}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - tasknet

  # ─── Django App ───────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskmanager_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-taskuser}:${POSTGRES_PASSWORD:-taskpass}@db:5432/${POSTGRES_DB:-taskmanager}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tasknet

  # ─── Nginx (опционально, раскомментируй для продакшна) ────────
  # nginx:
  #   image: nginx:alpine
  #   container_name: taskmanager_nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - static_data:/app/staticfiles:ro
  #     - media_data:/app/media:ro
  #   depends_on:
  #     - web
  #   networks:
  #     - tasknet

volumes:
  postgres_data:
  media_data:
  static_data:

networks:
  tasknet:
    driver: bridge
