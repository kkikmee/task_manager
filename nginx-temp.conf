# Временный конфиг Nginx — только HTTP
# Используется для первого запуска и получения SSL сертификата

server {
    listen 80;
    server_name kkikmee.ru www.kkikmee.ru;

    # ACME challenge — Certbot должен иметь прямой доступ
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Всё остальное проксируем на Django
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Отключаем редиректы на HTTPS на время первого запуска!
}
